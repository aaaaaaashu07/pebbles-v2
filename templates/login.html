<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Pebbles Heights</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="icon">🏘️</span>
      <h1>Pebbles Heights</h1>
      <p>Resident Parking Portal</p>
    </div>
    <div class="err-box" id="err"></div>
    <div class="auth-form">
      <div class="field">
        <label>Email</label>
        <input class="input" type="email" id="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input class="input" type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
    </div>
    <p class="auth-foot">New resident? <a href="/signup">Register here</a></p>
    <p class="auth-foot" style="margin-top:6px;font-size:11px;opacity:0.4">
      Admin: admin@pebbles.com / admin123 &nbsp;|&nbsp; Guard: guard@pebbles.com / guard123
    </p>
  </div>
</div>
<script>
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  const err=document.getElementById('err');
  if(!email||!pass){err.textContent='Please fill all fields';err.style.display='block';return;}
  const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
  const d=await res.json();
  if(d.success){
    if(d.role==='admin') window.location.href='/admin';
    else if(d.role==='guard') window.location.href='/guard';
    else window.location.href='/map';
  } else {err.textContent=d.message;err.style.display='block';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
